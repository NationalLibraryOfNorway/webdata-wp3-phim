name: Run test

on:
  push:
    branches:
      - main
  pull_request:

env:
  PYTHON_TARGETS: '3.11 3.12 3.13 3.14'
  PYO3_NO_PYTHON: TRUE

jobs:
  run-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.11', '3.12', '3.13', '3.14']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Setup PDM
        uses: pdm-project/setup-pdm@94a823180e06fcde4ad29308721954a521c96ed0
        with:
          python-version: ${{ matrix.python }}
          cache: true
          cache-dependency-path: pylock.toml
      - name: Setup rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd
      - name: Install project
        run: pdm install --with pdqhash
      - name: Run unit tests
        run: pdm run pytest --cov python

  build-linux:
    runs-on: ubuntu-latest
    name: Build wheels linux (${{ matrix.target }})
    strategy:
      matrix:
        target:
          - x86_64
          - i686
          - aarch64
          - armv7
          - s390x
          - ppc64le
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-musl
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        persist-credentials: false
    - name: Build wheels
      if: ${{ matrix.target != 'x86_64' }}
      uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad
      with:
        rust-toolchain: stable
        target: ${{ matrix.target }}
        manylinux: auto
        args: --release --out dist -i "${{ env.PYTHON_TARGETS }}"
    - name: Build wheels and sdist
      if: ${{ matrix.target == 'x86_64' }}
      uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad
      with:
        rust-toolchain: stable
        target: ${{ matrix.target }}
        manylinux: auto
        args: --release --out dist --sdist -i "${{ env.PYTHON_TARGETS }}"

  build-macos:
    runs-on: macos-latest
    name: Build wheels macOS (${{ matrix.target }})
    strategy:
      matrix:
        target: [universal2-apple-darwin, x86_64]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Build wheels - x86_64
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i "${{ env.PYTHON_TARGETS }}"

  build-windows:
    runs-on: windows-latest
    name: Build wheels Windows (${{ matrix.target }})
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Build wheels
        uses: PyO3/maturin-action@b1bd829e37fef14c63f19162034228a2f3dc1021  # Try old version that worked on different project
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i "${{ env.PYTHON_TARGETS }}"
